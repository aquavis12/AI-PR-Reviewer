name: Deploy AI PR Reviewer (Lambda)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FUNCTION_NAME: ai-pr-reviewer
  LAYER_NAME: ai-pr-reviewer-deps
  PYTHON_VERSION: "3.11"

jobs:
  deploy-lambda:
    name: Deploy Lambda + Layer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::593845248500:role/Github-OIDC-ECS-Dheeraj
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Lambda Layer
        run: |
          mkdir -p python/lib/python3.11/site-packages
          pip install requests boto3 pyyaml -t python/lib/python3.11/site-packages --quiet
          zip -r layer.zip python/

      - name: Deploy Layer
        id: layer
        run: |
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name ${{ env.LAYER_NAME }} \
            --zip-file fileb://layer.zip \
            --compatible-runtimes python3.11 \
            --query 'LayerVersionArn' \
            --output text)
          echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT

      - name: Package Lambda
        run: |
          zip -r lambda.zip lambda_handler.py src/ providers/

      - name: Deploy Lambda Code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.FUNCTION_NAME }} \
            --zip-file fileb://lambda.zip

      - name: Wait for update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.FUNCTION_NAME }}

      - name: Attach Layer
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.FUNCTION_NAME }} \
            --layers ${{ steps.layer.outputs.layer_arn }}
